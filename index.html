<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TexteAI — Textes professionnels en 10 secondes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; font-family: Georgia, 'Times New Roman', serif; color: #f0ece4; min-height: 100vh; }
    input { font-family: inherit; }
    button { font-family: inherit; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { from { opacity:0.4; } to { opacity:0.8; } }
    input::placeholder { color: rgba(240,236,228,0.2); }
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.2); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TOOLS = [
  {
    id: "motivation", emoji: "✍️", label: "Lettre de motivation",
    description: "Génère une lettre percutante en 10 secondes",
    fields: [
      { key: "poste", label: "Poste visé", placeholder: "Ex : Développeur web, Comptable..." },
      { key: "entreprise", label: "Entreprise", placeholder: "Ex : Google, Cabinet Dupont..." },
      { key: "experience", label: "Ton expérience", placeholder: "Ex : 2 ans en commerce, diplôme en info..." },
    ],
    prompt: (f) => `Rédige une lettre de motivation professionnelle et convaincante en français pour le poste de ${f.poste} chez ${f.entreprise}. Expérience du candidat : ${f.experience}. La lettre doit être chaleureuse, structurée (accroche, argumentation, conclusion), et faire environ 250 mots.`,
  },
  {
    id: "email", emoji: "📧", label: "Email professionnel",
    description: "Rédige des emails clairs et efficaces",
    fields: [
      { key: "objet", label: "Objet de l'email", placeholder: "Ex : Demande de rendez-vous, Relance devis..." },
      { key: "contexte", label: "Contexte", placeholder: "Ex : Je suis freelance et je contacte un client..." },
      { key: "ton", label: "Ton souhaité", placeholder: "Ex : Formel, Amical, Direct..." },
    ],
    prompt: (f) => `Rédige un email professionnel en français. Objet : ${f.objet}. Contexte : ${f.contexte}. Ton : ${f.ton}. L'email doit être court, percutant, avec une ligne d'accroche forte, un corps clair et un appel à l'action précis.`,
  },
  {
    id: "instagram", emoji: "📱", label: "Post Instagram / LinkedIn",
    description: "Crée du contenu qui engage et fait cliquer",
    fields: [
      { key: "sujet", label: "Sujet du post", placeholder: "Ex : Mon parcours entrepreneur, Astuce marketing..." },
      { key: "reseau", label: "Réseau", placeholder: "Instagram ou LinkedIn" },
      { key: "cible", label: "Audience cible", placeholder: "Ex : Jeunes entrepreneurs, RH, Parents..." },
    ],
    prompt: (f) => `Rédige un post ${f.reseau} en français sur le sujet : "${f.sujet}". Cible : ${f.cible}. Le post doit accrocher dès la 1ère ligne, raconter quelque chose d'authentique ou apporter de la valeur, et se terminer par une question ou un appel à l'action. Inclus des emojis pertinents et des hashtags efficaces.`,
  },
  {
    id: "fiche", emoji: "🛍️", label: "Fiche produit e-commerce",
    description: "Des descriptions qui vendent automatiquement",
    fields: [
      { key: "produit", label: "Nom du produit", placeholder: "Ex : Montre connectée Sport Pro X3..." },
      { key: "caracteristiques", label: "Caractéristiques", placeholder: "Ex : Étanche, 7 jours autonomie, GPS..." },
      { key: "cible", label: "Client cible", placeholder: "Ex : Sportifs, cadres actifs, ados..." },
    ],
    prompt: (f) => `Rédige une fiche produit e-commerce en français pour : ${f.produit}. Caractéristiques : ${f.caracteristiques}. Client cible : ${f.cible}. La fiche doit inclure un titre accrocheur, une description émotionnelle courte (50 mots), les 5 avantages clés en bullet points, et une phrase de conclusion qui donne envie d'acheter.`,
  },
];

const FREE_LIMIT = 3;
const STORAGE_KEY = "texteai_uses";
const getUses = () => { try { return parseInt(localStorage.getItem(STORAGE_KEY) || "0"); } catch { return 0; } };
const incUses = () => { try { localStorage.setItem(STORAGE_KEY, String(getUses() + 1)); } catch {} };

function App() {
  const [selectedTool, setSelectedTool] = React.useState(null);
  const [fields, setFields] = React.useState({});
  const [result, setResult] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [uses, setUses] = React.useState(getUses());
  const [showPaywall, setShowPaywall] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const resultRef = React.useRef(null);

  const remaining = Math.max(0, FREE_LIMIT - uses);

  const selectTool = (tool) => {
    setSelectedTool(tool);
    setFields({});
    setResult("");
    setShowPaywall(false);
  };

  const generate = async () => {
    if (remaining <= 0) { setShowPaywall(true); return; }
    for (const f of selectedTool.fields) {
      if (!fields[f.key]?.trim()) return;
    }
    setLoading(true);
    setResult("");
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: selectedTool.prompt(fields) }],
        }),
      });
      const data = await response.json();
      const text = data.content?.map(b => b.text || "").join("") || "Erreur de génération.";
      setResult(text);
      incUses();
      setUses(getUses());
      setTimeout(() => resultRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
    } catch(e) {
      setResult("Une erreur est survenue. Réessaie.");
    }
    setLoading(false);
  };

  const copyResult = () => {
    navigator.clipboard.writeText(result);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const allFilled = selectedTool && selectedTool.fields.every(f => fields[f.key]?.trim());

  const S = {
    bg: { minHeight:"100vh", background:"linear-gradient(135deg,#0a0a0f 0%,#12121f 50%,#0a0a0f 100%)", position:"relative" },
    glow: { position:"fixed", inset:0, pointerEvents:"none", background:"radial-gradient(ellipse 80% 50% at 20% 20%,rgba(255,200,80,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,120,60,0.05) 0%,transparent 60%)" },
    header: { borderBottom:"1px solid rgba(255,200,80,0.15)", padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(10,10,15,0.9)", position:"sticky", top:0, zIndex:100 },
    logo: { display:"flex", alignItems:"center", gap:10, cursor:"pointer" },
    logoIcon: { width:34, height:34, borderRadius:"50%", background:"linear-gradient(135deg,#f5c842,#f07828)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, boxShadow:"0 0 20px rgba(245,200,66,0.3)" },
    logoText: { fontSize:18, fontWeight:"bold", letterSpacing:"0.05em", color:"#f5c842" },
    main: { maxWidth:720, margin:"0 auto", padding:"36px 20px 80px" },
    hero: { textAlign:"center", marginBottom:48 },
    badge: { display:"inline-block", fontSize:10, letterSpacing:"0.3em", textTransform:"uppercase", color:"#f5c842", opacity:0.7, marginBottom:18, padding:"4px 14px", border:"1px solid rgba(245,200,66,0.2)", borderRadius:20 },
    h1: { fontSize:"clamp(32px,8vw,56px)", fontWeight:"bold", lineHeight:1.1, margin:"0 0 18px", background:"linear-gradient(135deg,#f5f0e8 30%,#f5c842 70%)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" },
    subtitle: { fontSize:17, color:"rgba(240,236,228,0.5)", maxWidth:440, margin:"0 auto 36px", lineHeight:1.6 },
    pills: { display:"flex", justifyContent:"center", gap:14, flexWrap:"wrap" },
    pill: { fontSize:12, color:"rgba(240,236,228,0.45)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:20, padding:"5px 14px" },
    grid: { display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))", gap:12, marginBottom:32 },
    card: (active) => ({ background: active ? "linear-gradient(135deg,rgba(245,200,66,0.18),rgba(240,120,40,0.12))" : "rgba(255,255,255,0.03)", border: active ? "1px solid rgba(245,200,66,0.45)" : "1px solid rgba(255,255,255,0.07)", borderRadius:14, padding:"18px 14px", cursor:"pointer", textAlign:"left", transition:"all 0.2s", transform: active ? "translateY(-2px)" : "none", boxShadow: active ? "0 8px 24px rgba(245,200,66,0.1)" : "none" }),
    form: { background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:18, padding:"26px 22px", marginBottom:20, animation:"fadeIn 0.3s ease" },
    label: { display:"block", fontSize:11, color:"rgba(240,236,228,0.45)", marginBottom:7, letterSpacing:"0.12em", textTransform:"uppercase" },
    input: { width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"11px 15px", fontSize:14, color:"#f0ece4", outline:"none" },
    btn: (active) => ({ width:"100%", padding:"14px", background: active ? "linear-gradient(135deg,#f5c842,#f07828)" : "rgba(255,255,255,0.07)", border:"none", borderRadius:12, cursor: active ? "pointer" : "not-allowed", fontSize:15, fontWeight:"bold", color: active ? "#0a0a0f" : "rgba(255,255,255,0.2)", transition:"all 0.2s", boxShadow: active ? "0 4px 20px rgba(245,200,66,0.25)" : "none" }),
    result: { background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:18, padding:"22px", animation:"fadeIn 0.4s ease" },
    paywall: { background:"linear-gradient(135deg,rgba(245,200,66,0.08),rgba(240,120,40,0.06))", border:"1px solid rgba(245,200,66,0.25)", borderRadius:18, padding:"36px 26px", textAlign:"center", marginBottom:22, animation:"fadeIn 0.3s ease" },
  };

  return (
    <div style={S.bg}>
      <div style={S.glow} />

      {/* Header */}
      <header style={S.header}>
        <div style={S.logo} onClick={() => { setSelectedTool(null); setResult(""); }}>
          <div style={S.logoIcon}>✦</div>
          <span style={S.logoText}>TexteAI</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8, background: remaining>0 ? "rgba(245,200,66,0.1)" : "rgba(220,50,50,0.15)", border:`1px solid ${remaining>0?"rgba(245,200,66,0.3)":"rgba(220,50,50,0.3)"}`, borderRadius:20, padding:"5px 14px", fontSize:13 }}>
          <span style={{ color: remaining>0 ? "#f5c842" : "#ff6b6b" }}>
            {remaining>0 ? `✦ ${remaining} essai${remaining>1?"s":""} gratuit${remaining>1?"s":""}` : "⚡ Limite atteinte"}
          </span>
        </div>
      </header>

      <main style={S.main}>

        {/* Hero (seulement si aucun outil sélectionné) */}
        {!selectedTool && (
          <div style={S.hero}>
            <div style={S.badge}>Alimenté par l'intelligence artificielle</div>
            <h1 style={S.h1}>Vos textes pro,<br/>en 10 secondes.</h1>
            <p style={S.subtitle}>Lettres de motivation, emails, posts réseaux sociaux, fiches produit — générés par IA, prêts à l'emploi.</p>
            <div style={S.pills}>
              {["⚡ Instantané", "🎯 Personnalisé", "💎 Professionnel"].map(l => <span key={l} style={S.pill}>{l}</span>)}
            </div>
          </div>
        )}

        {/* Outils */}
        <div>
          {!selectedTool && <p style={{ fontSize:12, letterSpacing:"0.2em", textTransform:"uppercase", color:"rgba(245,200,66,0.55)", marginBottom:14 }}>Choisir un outil</p>}
          <div style={S.grid}>
            {TOOLS.map(tool => (
              <div key={tool.id} style={S.card(selectedTool?.id===tool.id)} onClick={() => selectTool(tool)}>
                <div style={{ fontSize:24, marginBottom:8 }}>{tool.emoji}</div>
                <div style={{ fontSize:14, fontWeight:"bold", color:"#f0ece4", marginBottom:4 }}>{tool.label}</div>
                <div style={{ fontSize:11, color:"rgba(240,236,228,0.38)", lineHeight:1.4 }}>{tool.description}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Formulaire */}
        {selectedTool && !showPaywall && (
          <div style={S.form}>
            <h2 style={{ fontSize:16, color:"#f5c842", marginBottom:22, display:"flex", alignItems:"center", gap:10 }}>
              {selectedTool.emoji} {selectedTool.label}
            </h2>
            {selectedTool.fields.map(f => (
              <div key={f.key} style={{ marginBottom:16 }}>
                <label style={S.label}>{f.label}</label>
                <input
                  value={fields[f.key]||""}
                  onChange={e => setFields(prev=>({...prev,[f.key]:e.target.value}))}
                  placeholder={f.placeholder}
                  style={S.input}
                  onFocus={e=>e.target.style.borderColor="rgba(245,200,66,0.4)"}
                  onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"}
                />
              </div>
            ))}
            <button onClick={generate} disabled={loading||!allFilled} style={S.btn(allFilled&&!loading)}>
              {loading ? "✦ Génération en cours..." : `✦ Générer maintenant — ${remaining} essai${remaining>1?"s":""} gratuit${remaining>1?"s":""} restant${remaining>1?"s":""}`}
            </button>
          </div>
        )}

        {/* Paywall */}
        {showPaywall && (
          <div style={S.paywall}>
            <div style={{ fontSize:40, marginBottom:14 }}>⚡</div>
            <h2 style={{ fontSize:20, color:"#f5c842", marginBottom:10 }}>Tu as utilisé tes 3 essais gratuits</h2>
            <p style={{ color:"rgba(240,236,228,0.45)", marginBottom:26, lineHeight:1.6 }}>
              Passe à la version Premium pour générer en illimité et débloquer tous les outils.
            </p>
            <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" }}>
              <button style={{ padding:"13px 26px", background:"linear-gradient(135deg,#f5c842,#f07828)", border:"none", borderRadius:12, cursor:"pointer", fontSize:14, fontWeight:"bold", color:"#0a0a0f", boxShadow:"0 4px 20px rgba(245,200,66,0.3)" }}>
                ✦ Passer Premium — 9€/mois
              </button>
              <button style={{ padding:"13px 26px", background:"transparent", border:"1px solid rgba(245,200,66,0.3)", borderRadius:12, cursor:"pointer", fontSize:14, color:"#f5c842" }}>
                💳 Crédits — 5€ / 20 textes
              </button>
            </div>
          </div>
        )}

        {/* Skeleton loader */}
        {loading && (
          <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:18, padding:"26px" }}>
            {[100,82,94,68,86,58].map((w,i)=>(
              <div key={i} style={{ height:11, width:`${w}%`, borderRadius:6, background:"rgba(255,255,255,0.06)", marginBottom:12, animation:`pulse 1.5s ease-in-out ${i*0.12}s infinite alternate` }} />
            ))}
          </div>
        )}

        {/* Résultat */}
        {result && (
          <div ref={resultRef} style={S.result}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <span style={{ fontSize:12, color:"rgba(245,200,66,0.65)", letterSpacing:"0.1em", textTransform:"uppercase" }}>✦ Résultat généré</span>
              <button onClick={copyResult} style={{ background: copied?"rgba(100,220,100,0.15)":"rgba(255,255,255,0.07)", border:`1px solid ${copied?"rgba(100,220,100,0.3)":"rgba(255,255,255,0.1)"}`, borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:12, color: copied?"#6ddc6d":"rgba(240,236,228,0.5)", transition:"all 0.2s" }}>
                {copied ? "✓ Copié !" : "Copier"}
              </button>
            </div>
            <p style={{ fontSize:14, lineHeight:1.85, color:"rgba(240,236,228,0.82)", whiteSpace:"pre-wrap" }}>{result}</p>
          </div>
        )}

      </main>

      <footer style={{ textAlign:"center", padding:"20px", borderTop:"1px solid rgba(255,255,255,0.05)", fontSize:11, color:"rgba(240,236,228,0.18)" }}>
        TexteAI — Textes professionnels générés par intelligence artificielle
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
